name: Build iOS App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Show available Xcode versions
        run: ls /Applications/Xcode*.app

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install dependencies
        run: cd cook-vite && npm ci

      - name: Build web app
        run: cd cook-vite && npm run build

      - name: Sync Capacitor
        run: cd cook-vite && npx cap sync ios

      - name: Build iOS Archive
        run: |
          cd cook-vite/ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: cook-ios-app
          path: cook-vite/ios/App/build/App.xcarchive/Products/Applications
          retention-days: 7
