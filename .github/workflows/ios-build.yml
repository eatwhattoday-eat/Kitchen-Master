name: Build iOS App

on:
  workflow_dispatch:  # manual trigger
  push:
    tags:
      - 'v*'

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd cook-vite && npm ci

      - name: Build web app
        run: cd cook-vite && npm run build

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install CocoaPods
        run: |
          cd cook-vite/ios/App 2>/dev/null && pod install || echo "No CocoaPods needed"

      - name: Build iOS Archive
        run: |
          cd cook-vite
          npx cap sync ios
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA (unsigned)
        run: |
          cd cook-vite/ios/App
          xcodebuild -exportArchive \
            -archivePath $PWD/build/App.xcarchive \
            -exportOptionsPlist $PWD/ExportOptions.plist \
            -exportPath $PWD/build \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: cook-ios-unsigned
          path: cook-vite/ios/App/build/*.ipa
          retention-days: 7
